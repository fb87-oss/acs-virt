[machine]
type = "microvm"
memory = "512M"
kvm = true
pcie = false

[qemu]
binary = "out/qemu-x64-minimal/bin/qemu-system-x86_64"
bios_dir = "build/qemu-pc-bios"

[transport]
# Current backend implementation uses QEMU-mediated DMA. The shared-mem fast
# path is reserved for later direct guest RAM/ATU-backed queue walking.
ram_access = "qemu-mediated"

[[mmio_windows]]
name = "blk0"
base = "0xfeb00000"
size = "0x200"
# Project-reserved microvm axi-bus IRQ range is GSI 16..23.
irq = 16
socket = "run/axi-bus.sock"
target = "blk0"
enabled = true

[[mmio_windows]]
name = "con0"
base = "0xfeb00200"
size = "0x200"
# Console uses a separate interrupt from blk0.
irq = 17
socket = "run/axi-console.sock"
target = "con0"
enabled = true
